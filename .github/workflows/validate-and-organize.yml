name: Validate and organize repo, build and publish Docker images

on:
  push:
    branches:
      - main
    paths:
      - "config.toml"
      - "pieces/**"
      - "dependencies/**"
      - ".github/workflows/validate-and-organize.yml"

permissions:
  contents: write
  packages: write

jobs:
  validate-and-organize:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Pip install packages
        run: |
          python -m pip install -U pip
          pip install --no-cache-dir domino-py[cli] tomli

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize config.toml (strip UTF-8 BOM)
        run: |
          python -c "
          from pathlib import Path
          import tomli
          p = Path('config.toml')
          b = p.read_bytes()
          if b.startswith(b'\xef\xbb\xbf'):
              p.write_bytes(b[3:])
              print('Removed UTF-8 BOM from config.toml')
          tomli.load(p.open('rb'))
          print('config.toml parses OK')
          "

      - name: Run organize and build images
        env:
          DOCKER_CLIENT_TIMEOUT: "3600"
          COMPOSE_HTTP_TIMEOUT: "3600"
        run: |
          python scripts/verify_domino_imports.py
          domino piece organize --build-images --source-url=https://github.com/${{ github.repository }}

      - name: Retag image for GHCR
        run: |
          python <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          import tomli

          version = tomli.load(open("config.toml", "rb"))["repository"]["VERSION"]
          ghcr = f"ghcr.io/filipchrvala/industry_sg_vre_cost_optimizer:{version}-group0"

          dm_path = Path(".domino/dependencies_map.json")
          dm = json.loads(dm_path.read_text(encoding="utf-8"))
          built = dm["group0"]["source_image"]
          print(f"Organize built: {built}")
          print(f"GHCR target:  {ghcr}")

          if built != ghcr:
              subprocess.run(["docker", "tag", built, ghcr], check=True)
              dm["group0"]["source_image"] = ghcr
              dm_path.write_text(json.dumps(dm, indent=4) + "\n", encoding="utf-8")

          meta = Path(".domino/compiled_metadata.json")
          if meta.is_file():
              text = meta.read_text(encoding="utf-8")
              text = text.replace(built, ghcr)
              text = re.sub(
                  r"ghcr\.io/harbor\.testbed\.spice-platform\.eu/partner/uc3/industry_sg_vre_cost_optimizer",
                  "ghcr.io/filipchrvala/industry_sg_vre_cost_optimizer",
                  text,
              )
              meta.write_text(text, encoding="utf-8")
          PY

      - name: Publish images
        run: |
          IMAGE=$(python -c "import json; print(json.load(open('.domino/dependencies_map.json'))['group0']['source_image'])")
          echo "Pushing ${IMAGE}"
          docker push "${IMAGE}"

      - name: Commit files
        id: commit_files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          GIT_STATUS=$(git status -s)
          if [[ ! -z "$GIT_STATUS" ]]; then
            git add .domino/* && git commit -m "auto-organize" -a
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.commit_files.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.REPO_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Create Release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python -c "import tomli; print(tomli.load(open('config.toml','rb'))['repository']['VERSION'])")
          git fetch --tags origin
          if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Release tag ${VERSION} already exists — skipping domino piece release"
            echo "Docker image ${VERSION}-group0 was still published above."
          else
            domino piece release
          fi
